<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 自媒体多平台分发工具</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #27ae60;
            --danger: #e74c3c;
            --text: #333;
            --text-secondary: #666;
            --text-muted: #999;
            --border: #e0e0e0;
            --radius: 12px;
            --transition: 0.25s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-container {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .register-header { text-align: center; margin-bottom: 32px; }
        .register-header .logo { font-size: 42px; margin-bottom: 8px; }
        .register-header h1 { font-size: 22px; color: var(--text); font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all var(--transition);
            background: #fafafa;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .btn-register {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            margin-top: 8px;
        }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .btn-register:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .msg { text-align: center; margin-bottom: 16px; font-size: 14px; min-height: 20px; }
        .msg-error { color: var(--danger); }
        .msg-success { color: var(--success); }
        .footer-links { text-align: center; margin-top: 24px; }
        .footer-links a { color: var(--primary); text-decoration: none; font-size: 14px; }
        .footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="logo">📤</div>
            <h1>注册账号</h1>
        </div>
        <div class="msg" id="msg"></div>
        <form id="register-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码（至少6位）" required minlength="6">
            </div>
            <div class="form-group">
                <label for="email">邮箱（可选）</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱">
            </div>
            <button type="submit" class="btn-register">注 册</button>
        </form>
        <div class="footer-links">
            <a href="/login">已有账号？立即登录</a>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const msgEl = document.getElementById('msg');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const email = document.getElementById('email').value.trim();

            if (!username || !password) {
                msgEl.textContent = '用户名和密码不能为空';
                msgEl.className = 'msg msg-error';
                return;
            }
            if (password.length < 6) {
                msgEl.textContent = '密码至少需要6位';
                msgEl.className = 'msg msg-error';
                return;
            }

            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                const resp = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });
                const data = await resp.json();

                if (data.success) {
                    msgEl.textContent = '✅ ' + data.message + '，即将跳转到登录页...';
                    msgEl.className = 'msg msg-success';
                    setTimeout(() => { window.location.href = '/login'; }, 1500);
                } else {
                    msgEl.textContent = data.message || '注册失败';
                    msgEl.className = 'msg msg-error';
                }
            } catch (e) {
                msgEl.textContent = '网络错误，请稍后重试';
                msgEl.className = 'msg msg-error';
            } finally {
                btn.disabled = false;
                btn.textContent = '注 册';
            }
        });
    </script>
</body>
</html>
