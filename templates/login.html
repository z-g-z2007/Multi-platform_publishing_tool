<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自媒体多平台分发工具 - 登录</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #27ae60;
            --danger: #e74c3c;
            --text: #333;
            --text-secondary: #666;
            --text-muted: #999;
            --border: #e0e0e0;
            --radius: 12px;
            --transition: 0.25s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .logo { font-size: 42px; margin-bottom: 8px; }
        .login-header h1 { font-size: 22px; color: var(--text); font-weight: 700; margin-bottom: 4px; }
        .login-header p { font-size: 13px; color: var(--text-muted); }
        .platform-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; }
        .platform-row span { font-size: 28px; opacity: 0.8; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all var(--transition);
            background: #fafafa;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            margin-top: 8px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg { color: var(--danger); text-align: center; margin-bottom: 16px; font-size: 14px; min-height: 20px; }
        .footer-links { text-align: center; margin-top: 24px; }
        .footer-links a { color: var(--primary); text-decoration: none; font-size: 14px; }
        .footer-links a:hover { text-decoration: underline; }
        .demo-hint { text-align: center; margin-top: 16px; font-size: 12px; color: var(--text-muted); }
        .demo-hint code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">📤</div>
            <h1>自媒体多平台分发工具</h1>
            <p>一次编辑，多平台智能适配发布</p>
        </div>
        <div class="platform-row">
            <span>📕</span><span>💬</span><span>💡</span><span>📺</span>
        </div>
        <div class="error-msg" id="error-msg"></div>
        <form id="login-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>
        <div class="footer-links">
            <a href="/register">还没有账号？立即注册</a>
        </div>
        <div class="demo-hint">
            演示账号：<code>admin</code> / <code>admin123</code>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const errorEl = document.getElementById('error-msg');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                errorEl.textContent = '请输入用户名和密码';
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';
            errorEl.textContent = '';

            try {
                const resp = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await resp.json();

                if (data.success) {
                    window.location.href = '/publish';
                } else {
                    errorEl.textContent = data.message || '登录失败';
                }
            } catch (e) {
                errorEl.textContent = '网络错误，请稍后重试';
            } finally {
                btn.disabled = false;
                btn.textContent = '登 录';
            }
        });
    </script>
</body>
</html>
