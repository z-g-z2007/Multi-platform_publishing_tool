<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据看板 - 自媒体多平台分发工具</title>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --secondary: #764ba2;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #333;
            --text-secondary: #666;
            --text-muted: #999;
            --border: #e8e8e8;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
            --transition: 0.25s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #fff;
            padding: 0 30px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px rgba(102,126,234,0.3);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo { font-size: 22px; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .nav { display: flex; gap: 4px; }
        .nav a, .nav-btn {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            transition: all var(--transition);
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }
        .nav a:hover, .nav-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .nav a.active { background: rgba(255,255,255,0.28); color: #fff; font-weight: 600; }

        .container { max-width: 1100px; margin: 28px auto; padding: 0 20px; }

        /* Summary Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 22px 18px;
            text-align: center;
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .stat-card.card-tasks::before { background: var(--primary); }
        .stat-card.card-adapt::before { background: var(--info); }
        .stat-card.card-success::before { background: var(--success); }
        .stat-card.card-failed::before { background: var(--danger); }
        .stat-card.card-rate::before { background: var(--warning); }
        .stat-card .stat-icon { font-size: 28px; margin-bottom: 8px; }
        .stat-card .stat-number { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
        .stat-card .stat-label { font-size: 13px; color: var(--text-muted); }
        .stat-card .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .num-primary { color: var(--primary); }
        .num-info { color: var(--info); }
        .num-success { color: var(--success); }
        .num-danger { color: var(--danger); }
        .num-warning { color: var(--warning); }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .card-header-left { display: flex; align-items: center; gap: 10px; }
        .card-header .icon { font-size: 22px; }
        .card-header h2 { font-size: 17px; color: var(--text); font-weight: 600; }
        .refresh-btn {
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all var(--transition);
        }
        .refresh-btn:hover { border-color: var(--primary); color: var(--primary); }

        /* Chart */
        .chart-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            height: 280px;
            padding: 10px 20px 0;
        }
        .chart-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 140px;
        }
        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            height: 220px;
        }
        .chart-bar {
            width: 38px;
            border-radius: 6px 6px 0 0;
            transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
            min-height: 4px;
        }
        .chart-bar:hover { opacity: 0.85; }
        .chart-bar .bar-value {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        .bar-success { background: linear-gradient(180deg, #2ecc71, #27ae60); }
        .bar-failed { background: linear-gradient(180deg, #e74c3c, #c0392b); }
        .chart-label {
            margin-top: 10px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            text-align: center;
        }
        .chart-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        .legend-dot.dot-success { background: var(--success); }
        .legend-dot.dot-failed { background: var(--danger); }

        /* Platform Detail Cards */
        .platform-cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .platform-detail-card {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            transition: all var(--transition);
        }
        .platform-detail-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .pd-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .pd-icon { font-size: 28px; }
        .pd-name { font-weight: 600; font-size: 15px; }
        .pd-desc { font-size: 12px; color: var(--text-muted); }
        .pd-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .pd-stat {
            text-align: center;
            padding: 10px;
            background: #fafafa;
            border-radius: 8px;
        }
        .pd-stat .pd-val { font-size: 20px; font-weight: 700; }
        .pd-stat .pd-lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
        .pd-rate {
            margin-top: 12px;
            padding: 10px;
            background: #fafafa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .pd-rate-label { font-size: 13px; color: var(--text-secondary); }
        .pd-rate-value { font-size: 18px; font-weight: 700; }
        .progress-bar-bg {
            margin-top: 8px;
            height: 6px;
            background: #e8e8e8;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.8s ease;
        }

        /* Recent Tasks */
        .recent-list { }
        .recent-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 6px;
            background: #fafafa;
            font-size: 13px;
        }
        .recent-item:hover { background: #f3f3f3; }
        .recent-title { color: var(--text); }
        .recent-meta { display: flex; align-items: center; gap: 12px; }
        .mini-badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .platform-cards-grid { grid-template-columns: 1fr; }
            .container { padding: 0 12px; }
            .card { padding: 16px; }
            .chart-wrapper { height: 200px; }
            .chart-bar { width: 24px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="header-logo">📊</span>
            <h1>数据看板</h1>
        </div>
        <div class="nav">
            <a href="/publish">内容发布</a>
            <a href="/records">发布记录</a>
            <a href="/dashboard" class="active">数据看板</a>
            <button class="nav-btn" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="container">
        <!-- 总览统计 -->
        <div class="stats-grid">
            <div class="stat-card card-tasks">
                <div class="stat-icon">📋</div>
                <div class="stat-number num-primary" id="total-tasks">0</div>
                <div class="stat-label">发布任务总数</div>
            </div>
            <div class="stat-card card-adapt">
                <div class="stat-icon">🔄</div>
                <div class="stat-number num-info" id="total-adaptations">0</div>
                <div class="stat-label">平台适配次数</div>
            </div>
            <div class="stat-card card-success">
                <div class="stat-icon">✅</div>
                <div class="stat-number num-success" id="total-success">0</div>
                <div class="stat-label">发布成功数</div>
            </div>
            <div class="stat-card card-failed">
                <div class="stat-icon">❌</div>
                <div class="stat-number num-danger" id="total-failed">0</div>
                <div class="stat-label">发布失败数</div>
            </div>
            <div class="stat-card card-rate">
                <div class="stat-icon">📈</div>
                <div class="stat-number num-warning" id="overall-rate">0%</div>
                <div class="stat-label">整体成功率</div>
            </div>
        </div>

        <!-- 柱状图 -->
        <div class="card">
            <div class="card-header">
                <div class="card-header-left">
                    <span class="icon">📊</span>
                    <h2>各平台发布统计对比</h2>
                </div>
                <button class="refresh-btn" onclick="loadStats()">🔄 刷新</button>
            </div>
            <div class="chart-wrapper" id="chart-container"></div>
            <div class="chart-legend">
                <div class="legend-item"><span class="legend-dot dot-success"></span> 发布成功</div>
                <div class="legend-item"><span class="legend-dot dot-failed"></span> 发布失败</div>
            </div>
        </div>

        <!-- 平台详情卡片 -->
        <div class="card">
            <div class="card-header">
                <div class="card-header-left">
                    <span class="icon">📋</span>
                    <h2>平台详情统计</h2>
                </div>
            </div>
            <div class="platform-cards-grid" id="platform-stats"></div>
        </div>

        <!-- 最近发布 -->
        <div class="card">
            <div class="card-header">
                <div class="card-header-left">
                    <span class="icon">🕐</span>
                    <h2>最近发布任务</h2>
                </div>
            </div>
            <div class="recent-list" id="recent-tasks"></div>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const resp = await fetch('/api/dashboard/stats');
                const data = await resp.json();

                if (data.success) {
                    updateSummary(data.data.summary);
                    renderChart(data.data.chart_data);
                    renderPlatformStats(data.data.platform_stats);
                    renderRecentTasks(data.data.recent_tasks);
                }
            } catch (e) {
                console.error('加载统计数据失败', e);
            }
        }

        function updateSummary(s) {
            document.getElementById('total-tasks').textContent = s.total_tasks || 0;
            document.getElementById('total-adaptations').textContent = s.total_adaptations || 0;
            document.getElementById('total-success').textContent = s.total_success || 0;
            document.getElementById('total-failed').textContent = s.total_failed || 0;
            document.getElementById('overall-rate').textContent = (s.overall_success_rate || 0) + '%';
        }

        function renderChart(chartData) {
            const container = document.getElementById('chart-container');

            if (!chartData || chartData.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><p>暂无数据，去发布内容吧</p></div>';
                return;
            }

            const maxVal = Math.max(...chartData.map(d => Math.max(d.total || 1, 1)), 1);

            container.innerHTML = chartData.map(item => {
                const successH = Math.max((item.success / maxVal) * 100, 2);
                const failedH = Math.max((item.failed / maxVal) * 100, item.failed > 0 ? 2 : 0);
                return `
                    <div class="chart-column">
                        <div class="chart-bars">
                            <div class="chart-bar bar-success" style="height:${successH}%">
                                <span class="bar-value">${item.success}</span>
                            </div>
                            <div class="chart-bar bar-failed" style="height:${failedH}%">
                                ${item.failed > 0 ? `<span class="bar-value">${item.failed}</span>` : ''}
                            </div>
                        </div>
                        <div class="chart-label">${item.icon || ''} ${item.platform}</div>
                        <div class="chart-sub">共 ${item.total} 次</div>
                    </div>
                `;
            }).join('');
        }

        function renderPlatformStats(stats) {
            const container = document.getElementById('platform-stats');

            if (!stats || Object.keys(stats).length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无平台统计数据</p></div>';
                return;
            }

            container.innerHTML = Object.entries(stats).map(([platform, d]) => {
                const rateColor = d.success_rate >= 80 ? 'var(--success)' :
                                  d.success_rate >= 50 ? 'var(--warning)' : 'var(--danger)';
                const fillColor = d.success_rate >= 80 ? 'var(--success)' :
                                  d.success_rate >= 50 ? 'var(--warning)' : 'var(--danger)';
                return `
                    <div class="platform-detail-card" style="border-left: 3px solid ${d.color || '#667eea'};">
                        <div class="pd-header">
                            <span class="pd-icon">${d.icon || '📄'}</span>
                            <div>
                                <div class="pd-name">${d.name || platform}</div>
                                <div class="pd-desc">共适配 ${d.total} 次</div>
                            </div>
                        </div>
                        <div class="pd-stats">
                            <div class="pd-stat">
                                <div class="pd-val" style="color:var(--success);">${d.success}</div>
                                <div class="pd-lbl">✅ 成功</div>
                            </div>
                            <div class="pd-stat">
                                <div class="pd-val" style="color:var(--danger);">${d.failed}</div>
                                <div class="pd-lbl">❌ 失败</div>
                            </div>
                            <div class="pd-stat">
                                <div class="pd-val" style="color:var(--text-secondary);">${d.pending || 0}</div>
                                <div class="pd-lbl">⏳ 待发布</div>
                            </div>
                            <div class="pd-stat">
                                <div class="pd-val" style="color:var(--text-secondary);">${d.avg_retry || 0}</div>
                                <div class="pd-lbl">🔄 平均重试</div>
                            </div>
                        </div>
                        <div class="pd-rate">
                            <span class="pd-rate-label">成功率</span>
                            <span class="pd-rate-value" style="color:${rateColor};">${d.success_rate}%</span>
                        </div>
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width:${d.success_rate}%;background:${fillColor};"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderRecentTasks(tasks) {
            const container = document.getElementById('recent-tasks');

            if (!tasks || tasks.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>暂无发布记录</p></div>';
                return;
            }

            const statusBadges = {
                success: 'mini-badge badge-success', failed: 'mini-badge badge-failed',
                partial: 'mini-badge badge-partial', processing: 'mini-badge badge-processing',
                pending: 'mini-badge badge-pending'
            };
            const statusTexts = {
                success: '成功', failed: '失败', partial: '部分成功',
                processing: '处理中', pending: '待发布'
            };

            container.innerHTML = tasks.map(t => `
                <div class="recent-item">
                    <span class="recent-title">${escapeHtml(t.title)}</span>
                    <div class="recent-meta">
                        <span class="${statusBadges[t.status] || 'mini-badge'}" style="background:${t.status==='success'?'#d4edda':t.status==='failed'?'#f8d7da':t.status==='partial'?'#cce5ff':'#f0f0f0'};color:${t.status==='success'?'#155724':t.status==='failed'?'#721c24':t.status==='partial'?'#004085':'#666'};">${statusTexts[t.status] || t.status}</span>
                        <span style="font-size:11px;color:var(--text-muted);">${t.platforms_count || 0}个平台</span>
                        <span style="font-size:11px;color:var(--text-muted);">${formatDate(t.created_at)}</span>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDate(s) {
            if (!s) return '-';
            return new Date(s).toLocaleString('zh-CN');
        }

        function logout() { window.location.href = '/logout'; }

        loadStats();
    </script>
</body>
</html>
