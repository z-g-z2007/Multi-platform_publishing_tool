<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布记录 - 自媒体多平台分发工具</title>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --secondary: #764ba2;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #333;
            --text-secondary: #666;
            --text-muted: #999;
            --border: #e8e8e8;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
            --transition: 0.25s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #fff;
            padding: 0 30px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px rgba(102,126,234,0.3);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo { font-size: 22px; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .nav { display: flex; gap: 4px; }
        .nav a, .nav-btn {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            transition: all var(--transition);
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }
        .nav a:hover, .nav-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .nav a.active { background: rgba(255,255,255,0.28); color: #fff; font-weight: 600; }

        .container { max-width: 1000px; margin: 28px auto; padding: 0 20px; }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .card-header .icon { font-size: 22px; }
        .card-header h2 { font-size: 17px; color: var(--text); font-weight: 600; }

        /* Filters */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }
        .filter-bar select, .filter-bar input {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            font-family: inherit;
            background: #fafafa;
            color: var(--text);
        }
        .filter-bar select:focus { outline: none; border-color: var(--primary); }
        .btn-sm {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
            background: var(--primary);
            color: #fff;
            transition: all var(--transition);
        }
        .btn-sm:hover { background: var(--primary-dark); }

        /* Record Items */
        .record-item {
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 12px;
            overflow: hidden;
            transition: all var(--transition);
        }
        .record-item:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            background: #fafafa;
            transition: background var(--transition);
        }
        .record-header:hover { background: #f3f3f3; }
        .record-title-section { display: flex; align-items: center; gap: 12px; flex: 1; }
        .record-title { font-weight: 600; color: var(--text); font-size: 15px; }
        .record-meta { display: flex; align-items: center; gap: 12px; }
        .record-date { font-size: 12px; color: var(--text-muted); }
        .record-expand { font-size: 12px; color: var(--text-muted); transition: transform var(--transition); }
        .record-expand.expanded { transform: rotate(180deg); }

        /* Status Badges */
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }
        .badge-pending { background: #f0f0f0; color: #999; }
        .badge-processing { background: #fff3cd; color: #856404; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-failed { background: #f8d7da; color: #721c24; }
        .badge-partial { background: #cce5ff; color: #004085; }

        /* Record Details */
        .record-details { display: none; padding: 0 20px 20px; }
        .record-details.show { display: block; }
        .platform-list { margin-bottom: 16px; }
        .platform-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 6px;
            background: #fafafa;
        }
        .platform-row-left { display: flex; align-items: center; gap: 10px; }
        .platform-row-right { display: flex; align-items: center; gap: 10px; }
        .platform-name-text { font-weight: 500; font-size: 14px; }
        .platform-status-text {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .retry-count { font-size: 11px; color: var(--text-muted); }
        .error-text { color: var(--danger); font-size: 12px; }
        .btn-retry {
            padding: 5px 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: all var(--transition);
        }
        .btn-retry:hover:not(:disabled) { background: var(--primary-dark); }
        .btn-retry:disabled { background: #ccc; cursor: not-allowed; }

        /* Detail View */
        .detail-view {
            margin-top: 12px;
            padding: 16px;
            background: #fafafa;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .detail-view h4 { font-size: 14px; color: var(--primary); margin-bottom: 8px; }
        .detail-content {
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 13px;
            color: var(--text);
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: #fff;
            border-radius: 6px;
        }

        /* Pagination */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
        .page-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            background: #fff;
            transition: all var(--transition);
        }
        .page-btn:hover { border-color: var(--primary); color: var(--primary); }
        .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .loading { text-align: center; padding: 20px; color: var(--text-muted); }

        @media (max-width: 768px) {
            .container { padding: 0 12px; }
            .card { padding: 16px; }
            .record-header { flex-direction: column; gap: 8px; align-items: flex-start; }
            .platform-row { flex-direction: column; gap: 8px; }
            .filter-bar { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="header-logo">📋</span>
            <h1>发布记录</h1>
        </div>
        <div class="nav">
            <a href="/publish">内容发布</a>
            <a href="/records" class="active">发布记录</a>
            <a href="/dashboard">数据看板</a>
            <button class="nav-btn" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <span class="icon">📝</span>
                <h2>发布任务列表</h2>
            </div>
            <div class="filter-bar">
                <select id="status-filter" onchange="loadRecords(1)">
                    <option value="">全部状态</option>
                    <option value="success">全部成功</option>
                    <option value="failed">全部失败</option>
                    <option value="partial">部分成功</option>
                    <option value="pending">待发布</option>
                </select>
                <button class="btn-sm" onclick="loadRecords(1)">🔍 刷新</button>
            </div>
            <div id="records-container">
                <div class="loading">加载中...</div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script>
        const platformNames = {
            xiaohongshu: '小红书', wechat: '微信公众号',
            zhihu: '知乎', bilibili: 'B站'
        };
        const platformIcons = {
            xiaohongshu: '📕', wechat: '💬',
            zhihu: '💡', bilibili: '📺'
        };
        let currentPage = 1;

        function getStatusText(status) {
            const m = {
                pending: '待发布', processing: '处理中', publishing: '发布中',
                success: '成功', failed: '失败', partial: '部分成功'
            };
            return m[status] || status;
        }

        function getStatusBadge(status) {
            const cls = {
                pending: 'badge-pending', processing: 'badge-processing',
                success: 'badge-success', failed: 'badge-failed', partial: 'badge-partial'
            };
            return `<span class="status-badge ${cls[status] || 'badge-pending'}">${getStatusText(status)}</span>`;
        }

        function formatDate(s) {
            if (!s) return '-';
            return new Date(s).toLocaleString('zh-CN');
        }

        async function loadRecords(page = 1) {
            currentPage = page;
            const status = document.getElementById('status-filter').value;
            let url = `/api/records?page=${page}&per_page=8`;
            if (status) url += `&status=${status}`;

            const container = document.getElementById('records-container');
            container.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const resp = await fetch(url);
                const data = await resp.json();

                if (data.success) {
                    renderRecords(data.data);
                    renderPagination(data.total, data.pages, page);
                } else {
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div>加载失败</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div>加载失败</div>';
            }
        }

        function renderRecords(records) {
            const container = document.getElementById('records-container');

            if (!records || records.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>暂无发布记录</p>
                        <p style="font-size:12px;margin-top:8px;">去 <a href="/publish" style="color:var(--primary);">内容发布</a> 创建新任务吧</p>
                    </div>`;
                return;
            }

            container.innerHTML = records.map(r => {
                const platformCount = r.adaptations ? r.adaptations.length : 0;
                return `
                <div class="record-item">
                    <div class="record-header" onclick="toggleDetails(${r.id})">
                        <div class="record-title-section">
                            <span class="record-title">${escapeHtml(r.original_title || '(无标题)')}</span>
                            ${getStatusBadge(r.status)}
                            <span style="font-size:12px;color:var(--text-muted);">${platformCount}个平台</span>
                        </div>
                        <div class="record-meta">
                            <span class="record-date">${formatDate(r.created_at)}</span>
                            <span class="record-expand" id="expand-${r.id}">▼</span>
                        </div>
                    </div>
                    <div class="record-details" id="details-${r.id}">
                        <div class="platform-list">
                            ${(r.adaptations || []).map(a => `
                                <div class="platform-row" id="adapt-row-${a.id}">
                                    <div class="platform-row-left">
                                        <span>${platformIcons[a.platform_type] || '📄'}</span>
                                        <span class="platform-name-text">${a.platform_name || platformNames[a.platform_type] || a.platform_type}</span>
                                        <span class="platform-status-text status-${a.publish_status}" style="background:${a.publish_status==='success'?'#d4edda':a.publish_status==='failed'?'#f8d7da':'#f0f0f0'};color:${a.publish_status==='success'?'#155724':a.publish_status==='failed'?'#721c24':'#666'};">${getStatusText(a.publish_status)}</span>
                                        ${a.retry_count > 0 ? `<span class="retry-count">重试${a.retry_count}次</span>` : ''}
                                    </div>
                                    <div class="platform-row-right">
                                        ${a.error_message ? `<span class="error-text">${a.error_message}</span>` : ''}
                                        ${a.publish_status === 'failed' && a.can_retry !== false ? `<button class="btn-retry" onclick="event.stopPropagation();retryPublish(${a.id}, ${r.id})">🔄 重试</button>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <button class="btn-sm" style="margin-top:8px;" onclick="event.stopPropagation();showAdaptedContent(${r.id})">
                            📄 查看适配内容详情
                        </button>
                        <div class="detail-view" id="detail-view-${r.id}" style="display:none;"></div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleDetails(recordId) {
            const details = document.getElementById(`details-${recordId}`);
            const expand = document.getElementById(`expand-${recordId}`);
            const isShowing = details.classList.contains('show');
            details.classList.toggle('show');
            if (expand) expand.classList.toggle('expanded', !isShowing);
            // 关闭详情视图
            const detailView = document.getElementById(`detail-view-${recordId}`);
            if (detailView && !isShowing) {
                detailView.style.display = 'none';
            }
        }

        async function retryPublish(adaptationId, recordId) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = '⏳ 重试中...';

            try {
                const resp = await fetch(`/api/publish/retry/${adaptationId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await resp.json();

                if (data.success) {
                    // 更新当前行的状态
                    const row = document.getElementById(`adapt-row-${adaptationId}`);
                    if (row && data.publish_status) {
                        const statusEl = row.querySelector('.platform-status-text');
                        if (statusEl) {
                            const isSuccess = data.publish_status === 'success';
                            statusEl.textContent = getStatusText(data.publish_status);
                            statusEl.style.background = isSuccess ? '#d4edda' : '#f8d7da';
                            statusEl.style.color = isSuccess ? '#155724' : '#721c24';
                        }
                        // 更新重试按钮
                        const retryBtn = row.querySelector('.btn-retry');
                        if (retryBtn) {
                            if (data.publish_status === 'success') {
                                retryBtn.remove();
                            } else {
                                retryBtn.disabled = false;
                                retryBtn.textContent = '🔄 重试';
                            }
                        }
                        // 更新重试次数
                        const retryCount = row.querySelector('.retry-count');
                        if (retryCount && data.retry_count > 0) {
                            retryCount.textContent = `重试${data.retry_count}次`;
                        } else if (data.retry_count > 0) {
                            const rc = document.createElement('span');
                            rc.className = 'retry-count';
                            rc.textContent = `重试${data.retry_count}次`;
                            row.querySelector('.platform-row-left').appendChild(rc);
                        }
                    }
                    // 更新主任务状态
                    if (data.task_status) {
                        const headerBadge = document.querySelector(`#details-${recordId}`)
                            .previousElementSibling.querySelector('.status-badge');
                        if (headerBadge) {
                            headerBadge.textContent = getStatusText(data.task_status);
                            const clsMap = {
                                success: 'badge-success', failed: 'badge-failed',
                                partial: 'badge-partial', processing: 'badge-processing',
                                pending: 'badge-pending'
                            };
                            headerBadge.className = `status-badge ${clsMap[data.task_status] || 'badge-pending'}`;
                        }
                    }
                    alert(data.publish_status === 'success' ? '✅ 重试成功！' : '❌ 重试仍然失败');
                } else {
                    alert(data.message || '重试失败');
                }
            } catch (e) {
                alert('网络错误');
            } finally {
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = '🔄 重试';
                }
            }
        }

        async function showAdaptedContent(recordId) {
            const detailView = document.getElementById(`detail-view-${recordId}`);
            const isVisible = detailView.style.display === 'block';

            if (isVisible) {
                detailView.style.display = 'none';
                return;
            }

            detailView.style.display = 'block';
            detailView.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const resp = await fetch(`/api/records/${recordId}`);
                const data = await resp.json();

                if (data.success && data.data) {
                    const record = data.data;
                    let html = `<h4>📝 原始内容</h4>
                        <div class="detail-content"><strong>标题：</strong>${escapeHtml(record.original_title || '')}\n\n${escapeHtml(record.original_content || '')}</div>`;

                    (record.adaptations || []).forEach(adapt => {
                        html += `
                            <h4 style="margin-top:16px;">${platformIcons[adapt.platform_type] || '📄'} ${adapt.platform_name || adapt.platform_type} - 适配后内容</h4>
                            <div class="detail-content"><strong>标题：</strong>${escapeHtml(adapt.adapted_title || '')}\n\n${escapeHtml(adapt.adapted_content || '')}</div>
                        `;
                    });

                    detailView.innerHTML = html;
                }
            } catch (e) {
                detailView.innerHTML = '<p style="color:var(--danger);">加载失败</p>';
            }
        }

        function renderPagination(total, pages, current) {
            const pagination = document.getElementById('pagination');
            if (pages <= 1) { pagination.innerHTML = ''; return; }

            let html = `<button class="page-btn" onclick="loadRecords(${current - 1})" ${current === 1 ? 'disabled' : ''}>‹ 上一页</button>`;

            const maxButtons = 7;
            let start = Math.max(1, current - Math.floor(maxButtons / 2));
            let end = Math.min(pages, start + maxButtons - 1);
            if (end - start < maxButtons - 1) start = Math.max(1, end - maxButtons + 1);

            if (start > 1) { html += `<button class="page-btn" onclick="loadRecords(1)">1</button>`; if (start > 2) html += '<span style="padding:8px;">...</span>'; }

            for (let i = start; i <= end; i++) {
                html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="loadRecords(${i})">${i}</button>`;
            }

            if (end < pages) { if (end < pages - 1) html += '<span style="padding:8px;">...</span>'; html += `<button class="page-btn" onclick="loadRecords(${pages})">${pages}</button>`; }

            html += `<button class="page-btn" onclick="loadRecords(${current + 1})" ${current === pages ? 'disabled' : ''}>下一页 ›</button>`;
            pagination.innerHTML = html;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function logout() { window.location.href = '/logout'; }

        // 初始加载
        loadRecords(1);
    </script>
</body>
</html>
