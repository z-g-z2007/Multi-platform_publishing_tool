<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容发布 - 自媒体多平台分发工具</title>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #5a6fd6;
            --secondary: #764ba2;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --info: #3498db;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #333;
            --text-secondary: #666;
            --text-muted: #999;
            --border: #e8e8e8;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
            --transition: 0.25s ease;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: #fff;
            padding: 0 30px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 10px rgba(102,126,234,0.3);
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header-logo { font-size: 22px; }
        .header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
        .nav { display: flex; gap: 4px; }
        .nav a, .nav-btn {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            transition: all var(--transition);
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }
        .nav a:hover, .nav-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .nav a.active { background: rgba(255,255,255,0.28); color: #fff; font-weight: 600; }
        .user-info { display: flex; align-items: center; gap: 10px; font-size: 14px; }

        /* Container */
        .container { max-width: 960px; margin: 28px auto; padding: 0 20px; }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
            margin-bottom: 20px;
            transition: box-shadow var(--transition);
        }
        .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--border);
        }
        .card-header .icon { font-size: 22px; }
        .card-header h2 { font-size: 17px; color: var(--text); font-weight: 600; }

        /* Form */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }
        .form-group label .hint { color: var(--text-muted); font-weight: 400; font-size: 12px; }
        input[type="text"], textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all var(--transition);
            background: #fafafa;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        textarea { min-height: 200px; resize: vertical; line-height: 1.8; }
        .char-count { text-align: right; font-size: 12px; color: var(--text-muted); margin-top: 4px; }

        /* Platform Selector */
        .platforms-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
        .platform-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 22px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            user-select: none;
            background: #fafafa;
        }
        .platform-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .platform-card.selected {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(102,126,234,0.05), rgba(118,75,162,0.05));
            box-shadow: 0 2px 8px rgba(102,126,234,0.15);
        }
        .platform-card .platform-icon { font-size: 36px; margin-bottom: 10px; }
        .platform-card .platform-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
        .platform-card .platform-desc { font-size: 11px; color: var(--text-muted); text-align: center; line-height: 1.4; }
        .platform-card .check-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .platform-card.selected .check-badge { display: flex; }
        .platform-card .rule-tag {
            margin-top: 8px;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(102,126,234,0.1);
            color: var(--primary);
        }

        /* Buttons */
        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition);
            font-family: inherit;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.4);
        }
        .btn-outline {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        .btn-outline:hover:not(:disabled) { background: rgba(102,126,234,0.05); }
        .btn-secondary { background: #f0f0f0; color: var(--text-secondary); }
        .btn-secondary:hover:not(:disabled) { background: #e4e4e4; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 6px; }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #d0d0d0;
            border-radius: 10px;
            padding: 36px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: #fafafa;
        }
        .upload-area:hover, .upload-area.dragover { border-color: var(--primary); background: rgba(102,126,234,0.03); }
        .upload-area .upload-icon { font-size: 40px; display: block; margin-bottom: 8px; }
        .upload-area p { color: var(--text-secondary); font-size: 14px; }
        .upload-area .hint { color: var(--text-muted); font-size: 12px; }
        #upload-file { display: none; }
        .upload-list { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
        .upload-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #e8f5e9;
            border-radius: 20px;
            font-size: 13px;
            color: var(--success);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--card);
            border-radius: var(--radius);
            width: 92%;
            max-width: 860px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h3 { font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .modal-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none;
            background: #f0f0f0;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .modal-close:hover { background: #e0e0e0; }
        .modal-body { padding: 24px; overflow-y: auto; flex: 1; }

        /* Preview Tabs */
        .preview-tabs { display: flex; gap: 6px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .preview-tab {
            padding: 10px 18px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .preview-tab:hover { color: var(--primary); }
        .preview-tab.active { color: var(--primary); border-color: var(--primary); }

        /* Preview Content */
        .preview-panel { display: none; }
        .preview-panel.active { display: block; }
        .preview-content {
            white-space: pre-wrap;
            line-height: 1.9;
            color: var(--text);
            padding: 20px;
            background: #fafafa;
            border-radius: 8px;
            min-height: 200px;
            font-size: 14px;
            border: 1px solid var(--border);
        }
        .preview-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px dashed var(--border);
        }
        .preview-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 14px;
            font-size: 12px;
            color: var(--text-muted);
        }
        .preview-stats span { display: flex; align-items: center; gap: 4px; }
        .preview-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }
        .preview-tag {
            padding: 4px 10px;
            background: rgba(102,126,234,0.1);
            color: var(--primary);
            border-radius: 12px;
            font-size: 12px;
        }
        .style-rules-box {
            margin-top: 16px;
            padding: 14px;
            background: #f0f7ff;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }
        .style-rules-box h4 { font-size: 13px; color: var(--primary); margin-bottom: 8px; }
        .style-rules-box ul { list-style: none; padding: 0; }
        .style-rules-box li {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 3px 0;
        }
        .style-rules-box li::before { content: '• '; color: var(--primary); }

        /* Publish Progress */
        .publish-progress { margin-top: 18px; }
        .progress-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #fafafa;
            transition: all var(--transition);
        }
        .progress-item .platform-info { display: flex; align-items: center; gap: 10px; }
        .progress-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-pending { background: #f0f0f0; color: #999; }
        .badge-publishing { background: #fff3cd; color: #856404; animation: pulse 1s infinite; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-failed { background: #f8d7da; color: #721c24; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .progress-spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid #ccc;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Alerts */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }
        .alert.show { display: block; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        .alert-warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }

        /* Summary cards */
        .publish-summary { display: none; margin-top: 16px; }
        .publish-summary.show { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .summary-card {
            text-align: center;
            padding: 16px;
            border-radius: 8px;
            background: #fafafa;
        }
        .summary-card .num { font-size: 28px; font-weight: 700; }
        .summary-card .lbl { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .num-success { color: var(--success); }
        .num-failed { color: var(--danger); }
        .num-total { color: var(--primary); }

        /* Responsive */
        @media (max-width: 768px) {
            .platforms-grid { grid-template-columns: repeat(2, 1fr); }
            .container { padding: 0 12px; margin: 16px auto; }
            .card { padding: 18px; }
            .btn-group { flex-direction: column; }
            .btn { justify-content: center; }
            .header { padding: 0 16px; }
            .nav a { padding: 6px 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <span class="header-logo">📤</span>
            <h1>自媒体多平台分发工具</h1>
        </div>
        <div class="nav">
            <a href="/publish" class="active">内容发布</a>
            <a href="/records">发布记录</a>
            <a href="/dashboard">数据看板</a>
            <button class="nav-btn" onclick="logout()">退出</button>
        </div>
    </div>

    <div class="container">
        <!-- 提示消息 -->
        <div class="alert" id="alert"></div>

        <!-- 内容编辑 -->
        <div class="card">
            <div class="card-header">
                <span class="icon">✏️</span>
                <h2>内容编辑</h2>
            </div>
            <div class="form-group">
                <label>标题 <span class="hint">（各平台会自动适配字数限制）</span></label>
                <input type="text" id="title" placeholder="请输入内容标题..." maxlength="500">
                <div class="char-count"><span id="title-count">0</span>/500</div>
            </div>
            <div class="form-group">
                <label>正文内容 <span class="hint">（支持换行分段）</span></label>
                <textarea id="content" placeholder="请输入正文内容...&#10;&#10;提示：使用换行进行分段，各平台会自动优化排版格式"></textarea>
                <div class="char-count"><span id="content-count">0</span> 字</div>
            </div>
            <div class="form-group">
                <label>上传素材 <span class="hint">（可选，支持图片）</span></label>
                <div class="upload-area" id="upload-area">
                    <span class="upload-icon">📷</span>
                    <p>点击或拖拽上传图片</p>
                    <span class="hint">支持 PNG、JPG、JPEG、GIF</span>
                    <input type="file" id="upload-file" accept="image/*">
                </div>
                <div class="upload-list" id="upload-list"></div>
            </div>
        </div>

        <!-- 平台选择 -->
        <div class="card">
            <div class="card-header">
                <span class="icon">🎯</span>
                <h2>选择发布平台（可多选）</h2>
            </div>
            <div class="platforms-grid" id="platforms-grid">
                <div class="platform-card" data-platform="xiaohongshu">
                    <div class="check-badge">✓</div>
                    <div class="platform-icon">📕</div>
                    <div class="platform-name">小红书</div>
                    <div class="platform-desc">图文笔记风格<br>短平快，手机阅读</div>
                    <div class="rule-tag">自动标签+Emoji</div>
                </div>
                <div class="platform-card" data-platform="wechat">
                    <div class="check-badge">✓</div>
                    <div class="platform-icon">💬</div>
                    <div class="platform-name">微信公众号</div>
                    <div class="platform-desc">正式长文风格<br>排版工整，深度阅读</div>
                    <div class="rule-tag">标准化排版</div>
                </div>
                <div class="platform-card" data-platform="zhihu">
                    <div class="check-badge">✓</div>
                    <div class="platform-icon">💡</div>
                    <div class="platform-name">知乎</div>
                    <div class="platform-desc">干货正式文风<br>内容严谨，知识分享</div>
                    <div class="rule-tag">去口语化</div>
                </div>
                <div class="platform-card" data-platform="bilibili">
                    <div class="check-badge">✓</div>
                    <div class="platform-icon">📺</div>
                    <div class="platform-name">B站</div>
                    <div class="platform-desc">视频简介风格<br>简洁清爽，UP主风</div>
                    <div class="rule-tag">分区标签</div>
                </div>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="card">
            <div class="card-header">
                <span class="icon">🚀</span>
                <h2>操作</h2>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="adaptContent()" id="adapt-btn" disabled>
                    🔄 一键适配格式
                </button>
                <button class="btn btn-outline" onclick="previewContent()" id="preview-btn" disabled>
                    👁️ 预览各平台效果
                </button>
                <button class="btn btn-primary" onclick="publishContent()" id="publish-btn" disabled>
                    📤 一键批量发布
                </button>
            </div>

            <!-- 发布进度 -->
            <div class="publish-progress" id="publish-progress" style="display:none;"></div>
            <div class="publish-summary" id="publish-summary"></div>
        </div>
    </div>

    <!-- 预览弹窗 -->
    <div class="modal-overlay" id="preview-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>👁️ 各平台适配效果预览</h3>
                <button class="modal-close" onclick="closePreview()">×</button>
            </div>
            <div class="modal-body">
                <div class="preview-tabs" id="preview-tabs"></div>
                <div id="preview-panels"></div>
            </div>
        </div>
    </div>

    <script>
        // ============ 状态管理 ============
        let adaptedResults = [];
        let currentTaskId = null;

        // ============ 平台选择 ============
        document.querySelectorAll('.platform-card').forEach(card => {
            card.addEventListener('click', () => {
                card.classList.toggle('selected');
                updateButtons();
            });
        });

        function getSelectedPlatforms() {
            return Array.from(document.querySelectorAll('.platform-card.selected'))
                .map(el => el.dataset.platform);
        }

        // ============ 字符计数 ============
        document.getElementById('title').addEventListener('input', function() {
            document.getElementById('title-count').textContent = this.value.length;
            updateButtons();
        });
        document.getElementById('content').addEventListener('input', function() {
            document.getElementById('content-count').textContent = this.value.length;
            updateButtons();
        });

        // ============ 按钮状态 ============
        function updateButtons() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const selected = getSelectedPlatforms();
            const hasContent = title && content;

            document.getElementById('adapt-btn').disabled = !hasContent || selected.length === 0;
            document.getElementById('preview-btn').disabled = adaptedResults.length === 0;
            document.getElementById('publish-btn').disabled = adaptedResults.length === 0;
        }

        // ============ 提示消息 ============
        function showAlert(msg, type = 'info') {
            const el = document.getElementById('alert');
            el.className = `alert alert-${type} show`;
            el.textContent = msg;
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        // ============ 一键适配格式 ============
        async function adaptContent() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const selectedPlatforms = getSelectedPlatforms();

            if (!title || !content) {
                showAlert('请输入标题和内容', 'warning');
                return;
            }

            const adaptBtn = document.getElementById('adapt-btn');
            adaptBtn.disabled = true;
            adaptBtn.textContent = '⏳ 正在适配中...';

            try {
                const response = await fetch('/api/adapt', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content, platforms: selectedPlatforms })
                });

                const data = await response.json();

                if (data.success) {
                    adaptedResults = data.data;
                    updateButtons();
                    showAlert(`✅ 格式适配完成！共适配 ${data.success_count} 个平台`, 'success');
                    // 自动弹出预览
                    setTimeout(() => previewContent(), 600);
                } else {
                    showAlert(data.message || '适配失败', 'error');
                }
            } catch (e) {
                showAlert('网络错误，请稍后重试', 'error');
            } finally {
                adaptBtn.textContent = '🔄 一键适配格式';
                adaptBtn.disabled = false;
            }
        }

        // ============ 预览 ============
        function previewContent() {
            if (adaptedResults.length === 0) return;

            const tabsEl = document.getElementById('preview-tabs');
            const panelsEl = document.getElementById('preview-panels');

            tabsEl.innerHTML = '';
            panelsEl.innerHTML = '';

            adaptedResults.forEach((result, index) => {
                // Tab
                const tab = document.createElement('div');
                tab.className = `preview-tab ${index === 0 ? 'active' : ''}`;
                tab.innerHTML = `${result.platform_icon || '📄'} ${result.platform_name}`;
                tab.addEventListener('click', () => switchPreviewTab(index));
                tabsEl.appendChild(tab);

                // Panel
                const panel = document.createElement('div');
                panel.className = `preview-panel ${index === 0 ? 'active' : ''}`;
                panel.id = `panel-${index}`;

                const tagsHtml = (result.tags && result.tags.length > 0)
                    ? `<div class="preview-tags">${result.tags.map(t => `<span class="preview-tag">${t}</span>`).join('')}</div>`
                    : '';

                const rulesHtml = (result.style_rules && Object.keys(result.style_rules).length > 0)
                    ? `<div class="style-rules-box">
                        <h4>📋 该平台排版规则</h4>
                        <ul>${Object.entries(result.style_rules).map(([k, v]) => `<li><strong>${k}：</strong>${v}</li>`).join('')}</ul>
                       </div>`
                    : '';

                panel.innerHTML = `
                    <div class="preview-title">📝 ${result.adapted_title || '(无标题)'}</div>
                    <div class="preview-stats">
                        <span>📏 标题 ${result.title_length || 0} 字</span>
                        <span>📄 正文 ${result.content_length || 0} 字</span>
                    </div>
                    ${tagsHtml}
                    <div class="preview-content">${escapeHtml(result.adapted_content || '')}</div>
                    ${rulesHtml}
                `;
                panelsEl.appendChild(panel);
            });

            document.getElementById('preview-modal').classList.add('show');
        }

        function switchPreviewTab(index) {
            document.querySelectorAll('.preview-tab').forEach((t, i) => {
                t.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.preview-panel').forEach((p, i) => {
                p.classList.toggle('active', i === index);
            });
        }

        function closePreview() {
            document.getElementById('preview-modal').classList.remove('show');
        }

        // 点击遮罩关闭
        document.getElementById('preview-modal').addEventListener('click', function(e) {
            if (e.target === this) closePreview();
        });

        // ESC关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePreview();
        });

        // ============ 一键批量发布 ============
        async function publishContent() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const selectedPlatforms = getSelectedPlatforms();

            const publishBtn = document.getElementById('publish-btn');
            publishBtn.disabled = true;
            publishBtn.textContent = '⏳ 创建任务中...';

            try {
                // 创建发布任务
                const response = await fetch('/api/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content, platforms: selectedPlatforms })
                });

                const data = await response.json();

                if (data.success) {
                    currentTaskId = data.task_id;
                    showAlert(`📋 任务创建成功，共 ${data.platform_count} 个平台，开始发布...`, 'info');
                    await executePublish(data.task_id);
                } else {
                    showAlert(data.message || '创建任务失败', 'error');
                    publishBtn.disabled = false;
                    publishBtn.textContent = '📤 一键批量发布';
                }
            } catch (e) {
                showAlert('网络错误，请稍后重试', 'error');
                publishBtn.disabled = false;
                publishBtn.textContent = '📤 一键批量发布';
            }
        }

        async function executePublish(taskId) {
            const progressEl = document.getElementById('publish-progress');
            const summaryEl = document.getElementById('publish-summary');
            const selectedPlatforms = getSelectedPlatforms();

            const platformNames = {
                xiaohongshu: { name: '小红书', icon: '📕' },
                wechat: { name: '微信公众号', icon: '💬' },
                zhihu: { name: '知乎', icon: '💡' },
                bilibili: { name: 'B站', icon: '📺' }
            };

            // 显示进度条
            progressEl.style.display = 'block';
            summaryEl.classList.remove('show');
            progressEl.innerHTML = selectedPlatforms.map(p => {
                const info = platformNames[p] || { name: p, icon: '📄' };
                return `
                    <div class="progress-item" id="progress-${p}">
                        <div class="platform-info">
                            <span>${info.icon}</span>
                            <span>${info.name}</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span class="progress-spinner"></span>
                            <span class="progress-badge badge-publishing">发布中</span>
                        </div>
                    </div>
                `;
            }).join('');

            try {
                const response = await fetch(`/api/publish/execute/${taskId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (data.success && data.results) {
                    // 更新各平台状态
                    data.results.forEach(r => {
                        const el = document.getElementById(`progress-${r.platform}`);
                        if (el) {
                            const badge = el.querySelector('.progress-badge');
                            const spinner = el.querySelector('.progress-spinner');
                            if (spinner) spinner.remove();

                            if (r.status === 'success') {
                                badge.className = 'progress-badge badge-success';
                                badge.textContent = '✅ 发布成功';
                            } else {
                                badge.className = 'progress-badge badge-failed';
                                badge.textContent = '❌ 发布失败';
                                // 添加错误信息
                                const errSpan = document.createElement('span');
                                errSpan.style.cssText = 'font-size:11px;color:#e74c3c;';
                                errSpan.textContent = r.message;
                                el.appendChild(errSpan);
                            }
                        }
                    });

                    // 显示汇总
                    if (data.summary) {
                        summaryEl.classList.add('show');
                        summaryEl.innerHTML = `
                            <div class="summary-card">
                                <div class="num num-total">${data.summary.total}</div>
                                <div class="lbl">总平台数</div>
                            </div>
                            <div class="summary-card">
                                <div class="num num-success">${data.summary.success}</div>
                                <div class="lbl">发布成功</div>
                            </div>
                            <div class="summary-card">
                                <div class="num num-failed">${data.summary.failed}</div>
                                <div class="lbl">发布失败</div>
                            </div>
                        `;
                    }

                    const statusMsg = data.summary.failed > 0
                        ? `发布完成：成功 ${data.summary.success} 个，失败 ${data.summary.failed} 个`
                        : `🎉 全部发布成功！`;

                    showAlert(statusMsg, data.summary.failed > 0 ? 'warning' : 'success');
                }
            } catch (e) {
                showAlert('发布执行失败: ' + e.message, 'error');
            } finally {
                document.getElementById('publish-btn').disabled = false;
                document.getElementById('publish-btn').textContent = '📤 一键批量发布';
            }
        }

        // ============ 图片上传 ============
        const uploadArea = document.getElementById('upload-area');
        const uploadFile = document.getElementById('upload-file');

        uploadArea.addEventListener('click', () => uploadFile.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) uploadImage(file);
        });

        uploadFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) uploadImage(file);
        });

        async function uploadImage(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/api/material/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    const list = document.getElementById('upload-list');
                    list.innerHTML += `
                        <div class="upload-item">
                            <span>📄</span> ${data.filename}
                            <span style="font-size:11px;">✓</span>
                        </div>
                    `;
                } else {
                    showAlert(data.message || '上传失败', 'error');
                }
            } catch (e) {
                showAlert('上传失败，请重试', 'error');
            }
        }

        // ============ 工具函数 ============
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function logout() {
            window.location.href = '/logout';
        }
    </script>
</body>
</html>
